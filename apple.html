<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>APPLE GAME | CUSTOM</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --main: #05070a;
        --accent: #00ff66;
        --gold: #ffdf00;
        --red: #ff3131;
      }

      body {
        background: var(--main);
        color: white;
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 5px;
        display: flex;
        justify-content: center;
      }

      .game-container {
        width: 100%;
        max-width: 340px;
        background: #0d1117;
        border-radius: 12px;
        padding: 8px;
        border: 1px solid #1a1f2c;
        box-sizing: border-box;
      }

      .top-stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
        background: #161b22;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 11px;
      }
      .top-stats b {
        color: var(--gold);
        font-size: 13px;
      }

      .board {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(5, 1fr) 45px;
        gap: 3px;
        opacity: 0.3;
        pointer-events: none;
      }
      .row.active {
        opacity: 1;
        pointer-events: auto;
      }

      .cell {
        aspect-ratio: 1/1;
        background: #1c2230;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 2px solid #000;
        position: relative;
        overflow: hidden;
      }

      .apple-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .mult {
        font-size: 9px;
        color: var(--gold);
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0d14;
        border-radius: 4px;
      }

      .bet-area {
        margin-top: 8px;
        background: #161b22;
        padding: 8px;
        border-radius: 10px;
      }
      .quick-bets {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        margin-bottom: 8px;
      }
      .q-btn {
        background: #252d3d;
        border: 1px solid #333;
        color: white;
        padding: 5px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
      }

      input {
        width: 100%;
        background: #05070a;
        border: 1px solid #333;
        color: var(--accent);
        text-align: center;
        padding: 8px;
        border-radius: 5px;
        margin-bottom: 8px;
        box-sizing: border-box;
        font-size: 16px;
        font-family: "Cairo";
      }

      .btns {
        display: flex;
        gap: 5px;
      }
      .btn {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-family: "Cairo";
        font-weight: 900;
        cursor: pointer;
      }
      .btn-start {
        background: var(--accent);
        color: black;
      }
      .btn-cash {
        background: var(--gold);
        color: black;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="top-stats">
        <div>الرصيد: <b id="bal">0.00</b></div>
        <div>الربح المتوقع: <b id="profit">0.00</b></div>
      </div>

      <div class="board" id="board"></div>

      <div class="bet-area">
        <div class="quick-bets">
          <button class="q-btn" onclick="setBet(10)">10</button>
          <button class="q-btn" onclick="setBet(20)">20</button>
          <button class="q-btn" onclick="setBet(50)">50</button>
          <button class="q-btn" onclick="setBet(100)">100</button>
        </div>
        <input type="number" id="bet" value="100" />
        <div class="btns">
          <button class="btn btn-start" id="sBtn" onclick="start()">
            إبدأ اللعب
          </button>
          <button class="btn btn-cash" id="cBtn" onclick="cashOut()">
            سحب الأرباح
          </button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDSZmFVNSOy9dnrE6RJk1-8eOloncTmjWg",
        databaseURL:
          "https://zero-aaaca-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "zero-aaaca",
        appId: "1:866040129447:web:572b5f402d48885e67f882",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      let user = localStorage.getItem("active_user"),
        balance = 0,
        bet = 0,
        row = 9,
        active = false;
      const odds = [121.2, 69.9, 27.9, 11.1, 6.7, 4.0, 2.4, 1.9, 1.5, 1.2];

      // روابط الصور بعد التبديل
      const imgApple =
        "https://i.ibb.co/zhv73DBr/Whats-App-Image-2026-05-15-at-8-41-23-AM.jpg"; // السليمة (الزرع)
      const imgBad =
        "https://i.ibb.co/yck64hHb/Whats-App-Image-2026-05-15-at-8-41-21-AM.jpg"; // البايظة (الفواكه)

      db.ref("users/" + user + "/balance").on("value", (s) => {
        balance = s.val() || 0;
        document.getElementById("bal").innerText = balance.toFixed(2);
      });

      function setBet(val) {
        document.getElementById("bet").value = val;
      }

      function createBoard() {
        const b = document.getElementById("board");
        b.innerHTML = "";
        odds.forEach((o, i) => {
          const r = document.createElement("div");
          r.className = `row ${i === row && active ? "active" : ""}`;
          for (let j = 0; j < 5; j++) {
            const c = document.createElement("div");
            c.className = "cell";
            c.onclick = () => play(i, j, c);
            r.appendChild(c);
          }
          const m = document.createElement("div");
          m.className = "mult";
          m.innerText = "x" + o;
          r.appendChild(m);
          b.appendChild(r);
        });
      }

      function start() {
        let v = parseFloat(document.getElementById("bet").value);
        if (v > balance || v < 10) return alert("تأكد من الرصيد!");
        db.ref("users/" + user + "/balance").set(balance - v);
        bet = v;
        active = true;
        row = 9;
        document.getElementById("sBtn").disabled = true;
        createBoard();
      }

      function play(r, c, el) {
        if (!active || r !== row) return;
        if (Math.random() < 0.2) {
          // نسبة خسارة
          el.innerHTML = `<img src="${imgBad}" class="apple-img">`;
          el.style.backgroundColor = "#440000";
          active = false;
          setTimeout(() => {
            alert("حظ أوفر!");
            reset();
          }, 500);
        } else {
          el.innerHTML = `<img src="${imgApple}" class="apple-img">`;
          el.style.backgroundColor = "#004400";
          document.getElementById("profit").innerText = (
            bet * odds[row]
          ).toFixed(2);
          document.getElementById("cBtn").style.display = "block";
          if (row === 0) cashOut();
          else {
            row--;
            createBoard();
          }
        }
      }

      function cashOut() {
        let win = bet * odds[row];
        db.ref("users/" + user + "/balance").set(balance + win);
        alert("مبروك! ربحت " + win.toFixed(2));
        reset();
      }

      function reset() {
        active = false;
        row = 9;
        document.getElementById("sBtn").disabled = false;
        document.getElementById("cBtn").style.display = "none";
        document.getElementById("profit").innerText = "0.00";
        createBoard();
      }

      createBoard();
    </script>
  </body>
</html>
