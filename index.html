<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEROKING PLATFORM | DASHBOARD</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --main-bg: #090c14;
        --card-bg: #121723;
        --accent: #00ff66;
        --gold: #ffd700;
        --sidebar-w: 250px;
      }

      body {
        background: var(--main-bg);
        color: white;
        font-family: "Cairo", sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* هيدر الملف الشخصي (Profile Bar) */
      .top-profile-bar {
        background: #0d111b;
        padding: 10px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #1a1f2c;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .avatar {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        background: url("https://i.ibb.co/Vv9rS9Z/user-avatar.png") center/cover;
      }

      .user-details b {
        display: block;
        font-size: 16px;
        color: var(--accent);
      }

      .user-details span {
        font-size: 12px;
        color: #777;
      }

      .wallet-box {
        background: #181d29;
        padding: 8px 20px;
        border-radius: 12px;
        border: 1px solid #2a3245;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .wallet-box b {
        color: var(--gold);
        font-size: 18px;
      }

      /* حاوية الألعاب */
      .container {
        flex: 1;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .section-title {
        width: 100%;
        max-width: 1100px;
        margin-bottom: 30px;
        border-right: 5px solid var(--accent);
        padding-right: 15px;
      }

      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 30px;
        width: 100%;
        max-width: 1100px;
      }

      /* كروت الألعاب المحدثة */
      .game-card {
        background: var(--card-bg);
        border-radius: 25px;
        overflow: hidden;
        border: 1px solid #1d2333;
        transition: 0.4s;
        cursor: pointer;
        position: relative;
      }

      .game-card:hover {
        transform: translateY(-10px);
        border-color: var(--accent);
        box-shadow: 0 15px 40px rgba(0, 255, 102, 0.1);
      }

      .game-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        opacity: 0.8;
        transition: 0.4s;
      }

      .game-card:hover .game-img {
        opacity: 1;
        transform: scale(1.05);
      }

      .game-desc {
        padding: 20px;
        text-align: center;
      }

      .play-btn {
        background: var(--accent);
        color: black;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: 900;
        font-size: 16px;
        margin-top: 15px;
        cursor: pointer;
      }

      .action-buttons {
        margin-top: 40px;
        display: flex;
        gap: 15px;
      }

      .btn-secondary {
        background: #1c2230;
        color: white;
        border: 1px solid #333;
        padding: 10px 25px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
      }

      .btn-secondary:hover {
        background: var(--accent);
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="top-profile-bar">
      <div class="user-info">
        <div class="avatar"></div>
        <div class="user-details">
          <b id="userNameDisplay">ZEROKING</b>
          <span>ID: #48293</span>
        </div>
      </div>

      <div class="wallet-box">
        <span>رصيدك:</span>
        <b id="balanceDisplay">0.00</b>
        <small style="color: var(--accent)">EGP</small>
      </div>
    </div>

    <div class="container">
      <div class="section-title">
        <h2>الألعاب المتاحة</h2>
      </div>

      <div class="games-grid">
        <div class="game-card" onclick="location.href='crash.html'">
          <img
            src="https://i.ibb.co/Vv9rS9Z/crash-banner.png"
            class="game-img"
          />
          <div class="game-desc">
            <h3>CRASH AI</h3>
            <button class="play-btn">دخول اللعبة</button>
          </div>
        </div>

        <div class="game-card" onclick="location.href='apple.html'">
          <img
            src="https://i.ibb.co/Vv9rS9Z/apple-banner.png"
            class="game-img"
          />
          <div class="game-desc">
            <h3>APPLE OF FORTUNE</h3>
            <button class="play-btn">دخول اللعبة</button>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <a href="profile.html" class="btn-secondary">⚙️ إعدادات الحساب</a>
        <a href="withdraw.html" class="btn-secondary">💰 سحب الأرباح</a>
        <a href="deposit.html" class="btn-secondary">💳 إيداع</a>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDSZmFVNSOy9dnrE6RJk1-8eOloncTmjWg",
        databaseURL:
          "https://zero-aaaca-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "zero-aaaca",
        appId: "1:866040129447:web:572b5f402d48885e67f882",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      let user = localStorage.getItem("active_user");

      if (user) {
        document.getElementById("userNameDisplay").innerText =
          user.toUpperCase();
        db.ref("users/" + user + "/balance").on("value", (s) => {
          let bal = s.val() || 0;
          document.getElementById("balanceDisplay").innerText = bal.toFixed(2);
        });
      } else {
        location.href = "login.html"; // لو مش مسجل يرجعه للدخول
      }
    </script>
  </body>
</html>
