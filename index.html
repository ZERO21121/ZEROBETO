<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEROKING | OFFICIAL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --main-bg: #05070a;
        --card-bg: #0d1117;
        --accent: #00ff66;
        --gold: #ffdf00;
        --red: #ff4d4d;
      }
      body {
        background: var(--main-bg);
        color: white;
        font-family: "Cairo", sans-serif;
        margin: 0;
        user-select: none;
        overflow-x: hidden;
      }

      /* الهيدر */
      .top-nav {
        background: #0a0d14;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1a1f2c;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .brand {
        font-weight: 900;
        color: var(--accent);
        font-size: 18px;
        cursor: pointer;
      }

      /* شبكة الألعاب بالصور الجديدة */
      .games-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 15px;
      }
      .game-card {
        background: var(--card-bg);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid #21262d;
        text-align: center;
        transition: 0.2s;
      }
      .game-card:active {
        transform: scale(0.95);
      }

      .game-card img {
        width: 100%;
        height: 115px;
        object-fit: cover;
        border-bottom: 1px solid #21262d;
      }
      .game-card h4 {
        margin: 8px 0;
        font-size: 12px;
        font-weight: 900;
      }

      /* الأزرار والنوافذ */
      .btn-action {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        font-family: "Cairo";
      }
      .modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #0d1117;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid var(--accent);
        z-index: 3000;
        width: 85%;
        max-width: 350px;
      }
      .modal input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        background: #05070a;
        border: 1px solid #222;
        color: white;
        border-radius: 8px;
        box-sizing: border-box;
      }

      /* القائمة الجانبية */
      .side-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 80%;
        height: 100%;
        background: #0d1117;
        z-index: 4000;
        transition: 0.4s;
        padding: 20px;
        border-left: 1px solid var(--accent);
      }
      .side-menu.active {
        right: 0;
      }
      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 2500;
      }
    </style>
  </head>
  <body>
    <div class="top-nav">
      <div class="brand" id="adminTrigger">ZEROKING</div>
      <div
        onclick="toggleMenu(true)"
        style="
          cursor: pointer;
          border: 1px solid var(--accent);
          padding: 4px 12px;
          border-radius: 20px;
          font-size: 12px;
        "
      >
        👤 ملفي
      </div>
    </div>

    <div class="games-grid">
      <div class="game-card" onclick="location.href='crash.html'">
        <img
          src="https://i.ibb.co/PsFrw0TH/crash-predictor-aviator-logo-1.avif"
          alt="Crash"
        />
        <h4>CRASH AI ✈️</h4>
      </div>

      <div class="game-card" onclick="location.href='apple.html'">
        <img src="https://i.ibb.co/qMfbZKR4/138.jpg" alt="Apple Gold" />
        <h4>APPLE GOLD 🍎</h4>
      </div>
    </div>

    <div style="display: flex; gap: 10px; padding: 0 15px">
      <button
        class="btn-action"
        style="background: var(--accent); color: black"
        onclick="openModal('deposit')"
      >
        💳 إيداع
      </button>
      <button
        class="btn-action"
        style="background: #1a1f2c; color: white"
        onclick="openModal('withdraw')"
      >
        💰 سحب
      </button>
    </div>

    <div id="depositModal" class="modal">
      <h3 style="margin: 0; text-align: center">إيداع رصيد</h3>
      <button
        class="btn-action"
        style="background: #0088cc; color: white"
        onclick="window.open('https://t.me/Kash_bak1xbet')"
      >
        وكيل معتمد للشحن 💎
      </button>
      <p
        style="font-size: 10px; color: #666; text-align: center; margin: 10px 0"
      >
        أو حول لـ: 01011294483
      </p>
      <input type="number" id="depAmt" placeholder="المبلغ" />
      <input type="text" id="depPhone" placeholder="رقمك الذي حولت منه" />
      <button
        class="btn-action"
        style="background: var(--accent)"
        onclick="handleTransaction('deposit')"
      >
        تأكيد الطلب
      </button>
      <button
        onclick="closeModal()"
        style="
          background: none;
          border: none;
          color: #444;
          width: 100%;
          margin-top: 5px;
        "
      >
        إغلاق
      </button>
    </div>

    <div id="withdrawModal" class="modal">
      <h3 style="margin: 0; text-align: center">سحب أرباح</h3>
      <button
        class="btn-action"
        style="background: #0088cc; color: white"
        onclick="window.open('https://t.me/Kash_bak1xbet')"
      >
        سحب عبر الوكيل 💎
      </button>
      <input type="number" id="withAmt" placeholder="المبلغ للسحب" />
      <input type="text" id="withPhone" placeholder="رقم الاستلام" />
      <button
        class="btn-action"
        style="background: var(--red); color: white"
        onclick="handleTransaction('withdraw')"
      >
        طلب سحب فوري
      </button>
      <button
        onclick="closeModal()"
        style="
          background: none;
          border: none;
          color: #444;
          width: 100%;
          margin-top: 5px;
        "
      >
        إغلاق
      </button>
    </div>

    <div id="sideMenu" class="side-menu">
      <h3 style="text-align: center; color: var(--accent)">الملف الشخصي</h3>
      <div
        style="
          background: #161b22;
          padding: 12px;
          border-radius: 10px;
          margin-bottom: 10px;
        "
      >
        <div style="color: #888; font-size: 10px">اسم المستخدم</div>
        <b id="pName" style="color: white; font-size: 16px">--</b>
      </div>
      <div
        style="
          background: #161b22;
          padding: 12px;
          border-radius: 10px;
          margin-bottom: 10px;
        "
      >
        <div style="color: #888; font-size: 10px">ID الحساب</div>
        <b id="pID" style="color: var(--gold)">#0000</b>
      </div>
      <div
        style="
          background: #161b22;
          padding: 12px;
          border-radius: 10px;
          margin-bottom: 10px;
        "
      >
        <div style="color: #888; font-size: 10px">الرصيد المتاح</div>
        <b id="pBal" style="color: var(--accent); font-size: 18px">0.00 EGP</b>
      </div>
      <button
        class="btn-action"
        style="background: var(--accent)"
        onclick="toggleMenu(false)"
      >
        رجوع للرئيسية
      </button>
      <button
        class="btn-action"
        style="background: var(--red); color: white"
        onclick="logout()"
      >
        تسجيل الخروج
      </button>
    </div>

    <div
      id="overlay"
      class="overlay"
      onclick="closeModal(); toggleMenu(false);"
    ></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDSZmFVNSOy9dnrE6RJk1-8eOloncTmjWg",
        databaseURL:
          "https://zero-aaaca-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "zero-aaaca",
        appId: "1:866040129447:web:572b5f402d48885e67f882",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      let user = localStorage.getItem("active_user") || "guest";
      let currentBalance = 0;

      // مزامنة البيانات
      db.ref("users/" + user).on("value", (s) => {
        if (s.val()) {
          currentBalance = s.val().balance || 0;
          document.getElementById("pName").innerText = user.toUpperCase();
          document.getElementById("pID").innerText =
            "#" + (s.val().id || "7721");
          document.getElementById("pBal").innerText =
            currentBalance.toFixed(2) + " EGP";
        }
      });

      // عمليات السحب والإيداع
      function handleTransaction(type) {
        let amt = parseFloat(
          document.getElementById(type === "deposit" ? "depAmt" : "withAmt")
            .value
        );
        let phone = document.getElementById(
          type === "deposit" ? "depPhone" : "withPhone"
        ).value;
        if (!amt || !phone) return alert("اكمل البيانات");

        if (type === "withdraw") {
          if (amt > currentBalance) return alert("رصيدك غير كافي!");
          db.ref("users/" + user + "/balance").set(currentBalance - amt);
        }

        db.ref("admin_requests").push({
          user: user,
          type: type,
          amount: amt,
          phone: phone,
          time: new Date().toLocaleString(),
          status: "pending",
        });
        alert("تم إرسال الطلب بنجاح");
        closeModal();
      }

      // كود الإدمن السري (5 ضغطات + باسورد 12345)
      let clicks = 0;
      document.getElementById("adminTrigger").onclick = () => {
        clicks++;
        if (clicks === 5) {
          let p = prompt("كلمة سر الإدمن:");
          if (p === "12345") location.href = "admin.html";
          clicks = 0;
        }
        setTimeout(() => (clicks = 0), 2000);
      };

      function openModal(id) {
        document.getElementById(id + "Modal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      }
      function closeModal() {
        document
          .querySelectorAll(".modal")
          .forEach((m) => (m.style.display = "none"));
        document.getElementById("overlay").style.display = "none";
      }
      function toggleMenu(s) {
        document.getElementById("sideMenu").classList.toggle("active", s);
        document.getElementById("overlay").style.display = s ? "block" : "none";
      }
      function logout() {
        localStorage.removeItem("active_user");
        location.href = "login.html";
      }
    </script>
  </body>
</html>
