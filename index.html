<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1ILLONBET | OFFICIAL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --main-bg: #030508;
        --card-bg: rgba(0, 0, 0, 0.6); /* خلفية البطاقات أغمق لتناسب الصورة */
        --accent: #ffdf00;
        --accent-glow: rgba(255, 223, 0, 0.3);
        --red: #ff3333;
        --glass-border: rgba(255, 255, 255, 0.15);
      }

      body {
        /* دمج الصورة مع طبقة تظليل سوداء احترافية */
        background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
          url("https://i.ibb.co/PG8XjZS1/cindy-f-fgwl-WRw-Rf5g-unsplash.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed; /* الخلفية ثابتة لتعطي تأثير Parallax */
        color: white;
        font-family: "Cairo", sans-serif;
        margin: 0;
        user-select: none;
        overflow-x: hidden;
      }

      /* هيدر سينمائي شفاف */
      .top-nav {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .brand {
        font-weight: 900;
        font-size: 24px;
        letter-spacing: 1px;
        background: linear-gradient(45deg, #ffdf00, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        cursor: pointer;
        text-shadow: 0 0 15px var(--accent-glow);
      }

      .user-profile-btn {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--accent);
        padding: 6px 15px;
        border-radius: 50px;
        font-size: 13px;
        transition: 0.3s;
      }

      .user-profile-btn:hover {
        background: var(--accent);
        color: black;
        box-shadow: 0 0 15px var(--accent);
      }

      /* العناوين */
      .section-title {
        padding: 25px 20px 5px;
        font-size: 12px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 900;
      }

      /* شبكة الألعاب */
      .games-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        padding: 15px;
      }

      .game-card {
        background: var(--card-bg);
        backdrop-filter: blur(5px); /* تأثير زجاجي للبطاقات */
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
      }

      .game-card:hover {
        transform: scale(1.05);
        border-color: var(--accent);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .game-card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        opacity: 0.9;
      }

      .game-card h4 {
        margin: 10px 0;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }

      /* حاوية الأزرار */
      .action-container {
        display: flex;
        gap: 12px;
        padding: 20px 15px;
      }

      .btn-action {
        flex: 1;
        padding: 16px;
        border: none;
        border-radius: 15px;
        font-weight: 900;
        font-family: "Cairo";
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-transform: uppercase;
      }

      .btn-deposit {
        background: linear-gradient(45deg, #ffdf00, #ccac00);
        color: black;
        box-shadow: 0 5px 20px rgba(255, 223, 0, 0.2);
      }

      .btn-withdraw {
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(5px);
      }

      .btn-action:active {
        transform: scale(0.95);
      }

      /* النوافذ (Modals) */
      .modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(13, 17, 23, 0.95);
        backdrop-filter: blur(20px);
        padding: 25px;
        border-radius: 30px;
        border: 1px solid var(--accent);
        z-index: 3000;
        width: 85%;
        max-width: 380px;
      }

      .modal input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        color: white;
        border-radius: 12px;
        box-sizing: border-box;
      }

      /* القائمة الجانبية */
      .side-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 85%;
        height: 100%;
        background: rgba(5, 7, 10, 0.95);
        backdrop-filter: blur(15px);
        z-index: 4000;
        transition: 0.5s;
        padding: 30px 20px;
        border-left: 1px solid var(--accent);
      }

      .side-menu.active {
        right: 0;
      }

      .stats-card {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 12px;
        border: 1px solid var(--glass-border);
      }

      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2500;
      }
    </style>
  </head>
  <body>
    <div class="top-nav">
      <div class="brand" id="adminTrigger">1ILLONBET</div>
      <div class="user-profile-btn" onclick="toggleMenu(true)">👤 حسابي</div>
    </div>

    <div class="section-title">أهم الألعاب الآن</div>
    <div class="games-grid">
      <div class="game-card" onclick="location.href='crash.html'">
        <img
          src="https://i.ibb.co/PsFrw0TH/crash-predictor-aviator-logo-1.avif"
          alt="Crash"
        />
        <h4>CRASH AI ✈️</h4>
      </div>

      <div class="game-card" onclick="location.href='apple.html'">
        <img src="https://i.ibb.co/qMfbZKR4/138.jpg" alt="Apple Gold" />
        <h4>APPLE GOLD 🍎</h4>
      </div>
    </div>

    <div class="action-container">
      <button class="btn-action btn-deposit" onclick="openModal('deposit')">
        💳 إيداع
      </button>
      <button class="btn-action btn-withdraw" onclick="openModal('withdraw')">
        💰 سحب
      </button>
    </div>

    <div id="depositModal" class="modal">
      <h3 style="margin: 0 0 15px; text-align: center; color: var(--accent)">
        مركز الإيداع
      </h3>
      <button
        class="btn-action"
        style="background: #0088cc; color: white; margin-bottom: 15px"
        onclick="window.open('https://t.me/Kash_bak1xbet')"
      >
        تحدث مع الوكيل المعتمد 💎
      </button>
      <div
        style="
          background: rgba(255, 255, 255, 0.05);
          padding: 12px;
          border-radius: 12px;
          text-align: center;
          margin-bottom: 15px;
          border: 1px dashed var(--accent);
        "
      >
        <small style="color: #aaa">رقم فودافون كاش:</small><br />
        <b style="color: white; font-size: 18px">01011294483</b>
      </div>
      <input type="number" id="depAmt" placeholder="أدخل المبلغ" />
      <input type="text" id="depPhone" placeholder="الرقم المحول منه" />
      <button
        class="btn-action btn-deposit"
        onclick="handleTransaction('deposit')"
      >
        تأكيد الإيداع
      </button>
      <button
        onclick="closeModal()"
        style="
          background: none;
          border: none;
          color: #555;
          width: 100%;
          margin-top: 10px;
          cursor: pointer;
        "
      >
        رجوع
      </button>
    </div>

    <div id="withdrawModal" class="modal">
      <h3 style="margin: 0 0 15px; text-align: center; color: var(--red)">
        طلب سحب أرباح
      </h3>
      <input type="number" id="withAmt" placeholder="مبلغ السحب" />
      <input type="text" id="withPhone" placeholder="رقم استلام الكاش" />
      <button
        class="btn-action"
        style="background: var(--red); color: white"
        onclick="handleTransaction('withdraw')"
      >
        طلب سحب فوري
      </button>
      <button
        onclick="closeModal()"
        style="
          background: none;
          border: none;
          color: #555;
          width: 100%;
          margin-top: 10px;
          cursor: pointer;
        "
      >
        رجوع
      </button>
    </div>

    <div id="sideMenu" class="side-menu">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 30px;
        "
      >
        <h2 style="margin: 0; color: var(--accent); font-weight: 900">
          1ILLONBET
        </h2>
        <span
          onclick="toggleMenu(false)"
          style="font-size: 30px; cursor: pointer"
          >×</span
        >
      </div>

      <div class="stats-card">
        <div style="color: #888; font-size: 10px">الاسم المستعار</div>
        <b id="pName" style="color: white; font-size: 16px">--</b>
      </div>

      <div class="stats-card">
        <div style="color: #888; font-size: 10px">ID المستخدم</div>
        <b id="pID" style="color: var(--accent)">#0000</b>
      </div>

      <div
        class="stats-card"
        style="background: rgba(0, 255, 102, 0.05); border-color: #00ff66"
      >
        <div style="color: #888; font-size: 10px">الرصيد الكلي</div>
        <b id="pBal" style="color: #00ff66; font-size: 22px">0.00 EGP</b>
      </div>

      <div style="margin-top: 50px">
        <button
          class="btn-action"
          style="width: 100%; background: var(--red); color: white"
          onclick="logout()"
        >
          تسجيل الخروج
        </button>
      </div>
    </div>

    <div
      id="overlay"
      class="overlay"
      onclick="closeModal(); toggleMenu(false);"
    ></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDSZmFVNSOy9dnrE6RJk1-8eOloncTmjWg",
        databaseURL:
          "https://zero-aaaca-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "zero-aaaca",
        appId: "1:866040129447:web:572b5f402d48885e67f882",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      let user = localStorage.getItem("active_user") || "guest";
      let currentBalance = 0;

      db.ref("users/" + user).on("value", (s) => {
        if (s.val()) {
          currentBalance = s.val().balance || 0;
          document.getElementById("pName").innerText = user.toUpperCase();
          document.getElementById("pID").innerText =
            "#" + (s.val().id || "7721");
          document.getElementById("pBal").innerText =
            currentBalance.toFixed(2) + " EGP";
        }
      });

      function handleTransaction(type) {
        let amt = parseFloat(
          document.getElementById(type === "deposit" ? "depAmt" : "withAmt")
            .value
        );
        let phone = document.getElementById(
          type === "deposit" ? "depPhone" : "withPhone"
        ).value;
        if (!amt || !phone) return alert("يرجى إكمال الحقول المطلوبة");

        if (type === "withdraw" && amt > currentBalance)
          return alert("عذراً، رصيدك غير كافٍ");

        if (type === "withdraw")
          db.ref("users/" + user + "/balance").set(currentBalance - amt);

        db.ref("admin_requests").push({
          user: user,
          type: type,
          amount: amt,
          phone: phone,
          time: new Date().toLocaleString(),
          status: "pending",
          brand: "1ILLONBET",
        });
        alert("تم استلام طلبك، جارٍ المراجعة من الإدارة");
        closeModal();
      }

      let clicks = 0;
      document.getElementById("adminTrigger").onclick = () => {
        clicks++;
        if (clicks === 5) {
          let p = prompt("كود الدخول للإدارة:");
          if (p === "12345") location.href = "admin.html";
          clicks = 0;
        }
        setTimeout(() => (clicks = 0), 2000);
      };

      function openModal(id) {
        document.getElementById(id + "Modal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      }
      function closeModal() {
        document
          .querySelectorAll(".modal")
          .forEach((m) => (m.style.display = "none"));
        document.getElementById("overlay").style.display = "none";
      }
      function toggleMenu(s) {
        document.getElementById("sideMenu").classList.toggle("active", s);
        document.getElementById("overlay").style.display = s ? "block" : "none";
      }
      function logout() {
        localStorage.removeItem("active_user");
        location.href = "login.html";
      }
    </script>
  </body>
</html>
